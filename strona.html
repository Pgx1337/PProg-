<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasyno Online</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <header class="header">
        <div class="logo-container">
            <h1 class="logo">[Nazwa Kasyna]</h1>
        </div>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="#" class="active"><i class="fa-solid fa-gamepad"></i> Gry</a></li>
                <li><a href="#"><i class="fa-solid fa-wallet"></i> Saldo</a></li>
                <li><a href="#"><i class="fa-solid fa-clock-rotate-left"></i> Historia gier</a></li>
                <li class="auth-wrapper">
                    <a href="#" class="btn-auth"><i class="fa-solid fa-user"></i> Logowanie / Rejestracja</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <section class="games-section">
            <h2 class="section-title">Wybierz grę</h2>
            <div class="games-grid">
                <!-- Puste karty reprezentujące gry -->
                <div class="game-card">
                    <div class="game-icon"><i class="fa-solid fa-dice"></i></div>
                </div>
                <div class="game-card">
                    <div class="game-icon"><i class="fa-solid fa-slot-machine"></i><i class="fa-solid fa-7"></i></div>
                </div>
                <div class="game-card">
                    <div class="game-icon"><i class="fa-solid fa-clover"></i></div>
                </div>
                <div class="game-card">
                    <div class="game-icon"><i class="fa-solid fa-coins"></i></div>
                </div>
                <div class="game-card">
                    <div class="game-icon"><i class="fa-solid fa-gem"></i></div>
                </div>
                <div class="game-card">
                    <div class="game-icon"><i class="fa-sharp fa-solid fa-crown"></i></div>
                </div>
                <div class="game-card">
                    <div class="game-icon"><i class="fa-solid fa-star"></i></div>
                </div>
                <div class="game-card">
                    <div class="game-icon"><i class="fa-solid fa-bolt"></i></div>
                </div>
                <div class="game-card">
                    <div class="game-icon"><i class="fa-solid fa-heart"></i></div>
                </div>
                <div class="game-card">
                    <div class="game-icon"><i class="fa-solid fa-fire"></i></div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
