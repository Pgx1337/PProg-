<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasyno Online - Logowanie</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <header class="header">
        <div class="logo-container">
            <h1 class="logo">[Nazwa Kasyna]</h1>
            <div id="live-clock" class="live-clock"></div>
        </div>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="strona.html"><i class="fa-solid fa-gamepad"></i> Gry</a></li>
                <li><a href="live.html"><i class="fa-solid fa-satellite-dish"></i> Kasyno na żywo</a></li>
                <li class="auth-wrapper" style="margin-left: auto;">
                    <!-- Zastępowane przez auth.js -->
                </li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <section class="games-section" style="width: 100%; max-width: 1000px; display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center;">
            
            <!-- FORMULARZ LOGOWANIA -->
            <div class="modal-content" style="position: static; transform: none; box-shadow: 0 10px 30px rgba(112, 0, 255, 0.2); width: 100%; flex: 1; min-width: 300px;">
                <h2 class="modal-title">Zaloguj się</h2>
                <form id="login-form" class="login-form">
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="login-username" placeholder="Nazwa użytkownika" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Hasło" required>
                    </div>
                    <div id="login-msg" style="text-align: center; font-size: 0.9rem; font-weight: bold; margin-top: -10px;"></div>
                    <button type="submit" class="btn-submit">Zaloguj</button>
                </form>
            </div>

            <!-- FORMULARZ REJESTRACJI -->
            <div class="modal-content" style="position: static; transform: none; box-shadow: 0 10px 30px rgba(255, 0, 127, 0.1); width: 100%; flex: 1; min-width: 300px;">
                <h2 class="modal-title">Zarejestruj się</h2>
                <form id="register-form" class="login-form">
                    <div class="input-group">
                        <i class="fa-solid fa-user-plus"></i>
                        <input type="text" id="reg-username" placeholder="Nazwa użytkownika (min. 3 znaki)" minlength="3" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Hasło (min. 6 znaków)" minlength="6" required>
                    </div>
                    
                    <div class="input-group" style="display: flex; flex-direction: column; gap: 5px;">
                        <label for="reg-birthdate" style="color: var(--text-muted); font-size: 0.9rem;">Data urodzenia (Wymagane 18+)</label>
                        <div style="position: relative;">
                            <i class="fa-solid fa-calendar-days"></i>
                            <input type="date" id="reg-birthdate" required style="padding-left: 3rem; width: 100%;">
                        </div>
                    </div>

                    <div style="display: flex; align-items: flex-start; gap: 10px; margin-top: 10px;">
                        <input type="checkbox" id="reg-terms" required style="margin-top: 5px; width: 18px; height: 18px; accent-color: var(--accent-1);">
                        <label for="reg-terms" style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.4;">
                            Oświadczam, że mam ukończone 18 lat i akceptuję <a href="#" style="color: var(--accent-1); text-decoration: none;">Regulamin kasyna</a> oraz <a href="#" style="color: var(--accent-1); text-decoration: none;">Politykę Prywatności</a>. Rozumiem, że hazard wiąże się z ryzykiem.
                        </label>
                    </div>

                    <div id="reg-msg" style="text-align: center; font-size: 0.9rem; font-weight: bold;"></div>
                    
                    <button type="submit" class="btn-submit" style="background: linear-gradient(135deg, var(--accent-2), var(--accent-1));">Utwórz konto</button>
                </form>
            </div>

        </section>
    </main>

    <script>
        const API_URL = '/api';

        // Obsługa Logowania
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const msgBox = document.getElementById('login-msg');
            msgBox.innerHTML = '';

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                
                if (!response.ok) {
                    msgBox.style.color = '#ff4d4d'; // czerwony
                    msgBox.innerText = data.error || 'Błąd logowania.';
                } else {
                    msgBox.style.color = '#00e676'; // zielony
                    msgBox.innerText = data.message;
                    // Można np. zapisać w localStorage i przekierować
                    localStorage.setItem('user', JSON.stringify(data.user));
                    setTimeout(() => window.location.href = 'strona.html', 1500);
                }
            } catch (err) {
                msgBox.style.color = '#ff4d4d';
                msgBox.innerText = 'Błąd połączenia z serwerem.';
            }
        });

        // Obsługa Rejestracji
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const birthdate = document.getElementById('reg-birthdate').value;
            const termsAccepted = document.getElementById('reg-terms').checked;
            const msgBox = document.getElementById('reg-msg');
            msgBox.innerHTML = '';

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, birthdate, termsAccepted })
                });
                const data = await response.json();
                
                if (!response.ok) {
                    msgBox.style.color = '#ff4d4d';
                    msgBox.innerText = data.error || 'Błąd rejestracji.';
                } else {
                    msgBox.style.color = '#00e676';
                    msgBox.innerText = data.message;
                    document.getElementById('register-form').reset();
                }
            } catch (err) {
                msgBox.style.color = '#ff4d4d';
                msgBox.innerText = 'Błąd połączenia z serwerem.';
            }
        });
    </script>

    <script>
        function updateClock() {
            const now = new Date();
            const opcjeDaty = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dataStr = now.toLocaleDateString('pl-PL', opcjeDaty);
            const dataStrCapitalized = dataStr.charAt(0).toUpperCase() + dataStr.slice(1);
            const czasStr = now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            document.getElementById('live-clock').innerHTML = `<i class="fa-regular fa-calendar-days"></i> ${dataStrCapitalized} <span class="time-sep">|</span> <i class="fa-regular fa-clock"></i> <span class="time-text">${czasStr}</span>`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
<script src="auth.js"></script></body>
</html>
